<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarjetas de Producto</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
    </style>
</head>

<body>

    <div class="cards-container">

        <!-- ==========================================
        TARJETA 1 – Auriculares Inalámbricos
        ========================================== -->
        <div class="product-card highlight">
            <div class="card-image">🎧</div>
            <h2 class="product-name">Auriculares Pro</h2>
            <p class="product-desc">
                Sonido envolvente, cancelación de ruido y 40 h de batería.
            </p>
            <div class="product-price">
                $89.90 <small>USD</small>
            </div>
            <button class="btn-comprar">Comprar</button>
        </div>

        <!-- ==========================================
        TARJETA 2 – Reloj Inteligente
        ========================================== -->
        <div class="product-card highlight">
            <div class="card-image">⌚</div>
            <h2 class="product-name">Smartwatch Fit</h2>
            <p class="product-desc">
                Monitorea tu salud, notificaciones y GPS integrado.
            </p>
            <div class="product-price">
                $149.00 <small>USD</small>
            </div>
            <button class="btn-comprar">Comprar</button>
        </div>

        <!-- ==========================================
        TARJETA 3 – Mochila Urbana
        ========================================== -->
        <div class="product-card highlight">
            <div class="card-image">🎒</div>
            <h2 class="product-name">Mochila Urban</h2>
            <p class="product-desc">
                Impermeable, con compartimento para laptop de 15&quot;.
            </p>
            <div class="product-price">
                $59.50 <small>USD</small>
            </div>
            <button class="btn-comprar">Comprar</button>
        </div>

    </div>

</body>
</html>
